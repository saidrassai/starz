name: ⭐ Sync Stars

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.STARZ_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync starred repos
        env:
          GH_TOKEN: ${{ secrets.STARZ_PAT }}
        run: python3 sync_stars.py

      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "starz Bot"
            git add -A
            git diff --staged --quiet || git commit -m "⬆️ Sync stars - $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes — skipping commit"
          fi
